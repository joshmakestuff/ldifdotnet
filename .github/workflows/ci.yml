name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Runner images promise pwsh; fail rather than silently skip the pwsh e2e tests.
      LDIF_REQUIRE_PWSH: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet test

  test-release:
    name: test (Release)
    runs-on: ubuntu-latest
    env:
      LDIF_REQUIRE_PWSH: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # Release differs from the Debug matrix: optimizations on, Debug.Assert
      # compiled out — the configuration that actually ships must also be green.
      - run: dotnet test -c Release

  pack:
    name: pack validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet pack -c Release -o packages -p:ContinuousIntegrationBuild=true
      - name: Exactly the three library packages must pack
        run: |
          ls -1 packages/*.nupkg
          test "$(ls -1 packages/*.nupkg | wc -l)" = "3"

  differential:
    name: differential vs OpenLDAP
    runs-on: ubuntu-latest
    env:
      LDIF_DIFFERENTIAL: "1"
      LDIF_EXPECTED_OPENLDAP: "2.6"
      LDIF_REQUIRE_PWSH: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Install OpenLDAP tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends slapd ldap-utils
          # slapadd/slapcat run with our own config in a temp dir; the packaged
          # AppArmor profile would deny that, so unload it.
          sudo apparmor_parser -R /etc/apparmor.d/usr.sbin.slapd 2>/dev/null || true
          /usr/sbin/slapd -V 2>&1 | head -2 || true
      - run: dotnet test
